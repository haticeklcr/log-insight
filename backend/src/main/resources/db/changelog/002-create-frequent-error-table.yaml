databaseChangeLog:
  - changeSet:
      id: 002-create-frequent-error-table
      author: hatice
      changes:
        - createTable:
            tableName: frequent_error
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: analysis_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: occurrence_count
                  type: INT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: frequent_error
            baseColumnNames: analysis_id
            referencedTableName: log_analysis
            referencedColumnNames: id
            constraintName: fk_frequent_error_analysis
            onDelete: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: frequent_error
            constraintName: fk_frequent_error_analysis
        - dropTable:
            tableName: frequent_error