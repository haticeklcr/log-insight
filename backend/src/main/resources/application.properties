spring.application.name=log-insight

app.log-analysis.max-file-size=10MB
spring.servlet.multipart.max-file-size=${app.log-analysis.max-file-size}
spring.servlet.multipart.max-request-size=${app.log-analysis.max-file-size}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.cors.allowed-methods=GET

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:loginsight}
spring.datasource.username=${DB_USERNAME:loginsight}
spring.datasource.password=${DB_PASSWORD:loginsight}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

app.analysis-executor.core-pool-size=${ANALYSIS_EXECUTOR_CORE_POOL_SIZE:2}
app.analysis-executor.max-pool-size=${ANALYSIS_EXECUTOR_MAX_POOL_SIZE:4}
app.analysis-executor.queue-capacity=${ANALYSIS_EXECUTOR_QUEUE_CAPACITY:50}
app.analysis-executor.thread-name-prefix=${ANALYSIS_EXECUTOR_THREAD_NAME_PREFIX:log-analysis-}

app.analysis-job.max-retry=${ANALYSIS_JOB_MAX_RETRY:3}
app.analysis-job.progress-interval=${ANALYSIS_JOB_PROGRESS_INTERVAL:100}
app.analysis-job.temp-directory=${ANALYSIS_TEMP_DIRECTORY:/tmp/log-insight}