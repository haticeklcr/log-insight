services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-loginsight}
      POSTGRES_USER: ${DB_USERNAME:-loginsight}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loginsight}
    volumes:
      - log-insight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-loginsight} -d ${DB_NAME:-loginsight}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_LOG_ANALYSIS_MAX_FILE_SIZE: ${APP_LOG_ANALYSIS_MAX_FILE_SIZE:-10MB}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-loginsight}
      DB_USERNAME: ${DB_USERNAME:-loginsight}
      DB_PASSWORD: ${DB_PASSWORD:-loginsight}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  log-insight-postgres-data:
    name: log-insight-postgres-data